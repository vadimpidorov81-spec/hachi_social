services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hachi
      POSTGRES_USER: hachi
      POSTGRES_PASSWORD: hachi
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hachi -d hachi"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../db/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://hachi:hachi@postgres:5432/hachi?sslmode=disable"
      - "up"
    restart: "no"

  seed:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: hachi
    volumes:
      - ./seed.sql:/seed.sql:ro
    command:
      - "psql"
      - "-h"
      - "postgres"
      - "-U"
      - "hachi"
      - "-d"
      - "hachi"
      - "-v"
      - "ON_ERROR_STOP=1"
      - "-f"
      - "/seed.sql"
    restart: "no"

  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    environment:
      APP_ENV: development
      APP_VERSION: dev
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://hachi:hachi@postgres:5432/hachi?sslmode=disable
      APP_DEV_USER_ID: 11111111-1111-4111-8111-111111111111
      LOG_LEVEL: debug
      LOG_DIR: out/logs
    ports:
      - "8080:8080"
    volumes:
      - ../out/logs:/app/out/logs
    restart: unless-stopped

volumes:
  postgres_data:
